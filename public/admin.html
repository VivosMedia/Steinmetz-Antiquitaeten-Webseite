<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verwaltung · Steinmetz Antiquitäten</title>
  <link rel="stylesheet" href="fonts/fonts.css">
  <style>
    :root {
      --cream:      #F5F0E8;
      --brown:      #2C1810;
      --brown-deep: #1A0F08;
      --brown-mid:  #3D2B1F;
      --brown-panel:#251510;
      --gold:       #C9A84C;
      --gold-light: #DFC06A;
      --warm-grey:  #8B7355;
      --border:     rgba(201,168,76,0.18);
      --border-hi:  rgba(201,168,76,0.45);
      --red-dark:   #6B0E12;
      --red-light:  #ff9090;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: var(--brown-deep);
      color: var(--cream);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── GATE ──────────────────────────────────────────── */
    #gate {
      position: fixed; inset: 0;
      background: var(--brown-deep);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .gate-card {
      width: 360px;
      border: 1px solid var(--border);
      padding: 52px 44px 44px;
      text-align: center;
      background: var(--brown-panel);
      position: relative;
    }
    .gate-card::before {
      content: '';
      position: absolute; inset: 6px;
      border: 1px solid rgba(201,168,76,0.07);
      pointer-events: none;
    }
    .gate-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem;
      color: var(--cream);
      letter-spacing: 0.01em;
      margin-bottom: 4px;
    }
    .gate-sub {
      font-size: 0.62rem;
      letter-spacing: 0.38em;
      text-transform: uppercase;
      color: var(--warm-grey);
      margin-bottom: 38px;
    }
    .gate-rule {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 32px;
    }
    .gate-rule::before, .gate-rule::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--border), transparent);
    }
    .gate-rule-lozenge {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .gate-input {
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-bottom-color: rgba(201,168,76,0.3);
      color: var(--cream);
      padding: 13px 16px;
      font-family: 'Lato', sans-serif;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      text-align: center;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
      margin-bottom: 14px;
    }
    .gate-input:focus {
      border-color: var(--border-hi);
      background: rgba(255,255,255,0.06);
    }
    .gate-input::placeholder { color: rgba(245,240,232,0.2); letter-spacing: 0.05em; }
    .gate-btn {
      width: 100%;
      background: var(--gold);
      border: none;
      color: var(--brown-deep);
      padding: 13px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .gate-btn:hover { background: var(--gold-light); }
    .gate-error {
      margin-top: 14px;
      color: #e07070;
      font-size: 0.78rem;
      min-height: 1.2em;
    }

    /* ─── ADMIN SHELL ───────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100vh; }

    /* Header */
    .adm-header {
      height: 56px;
      background: var(--brown-panel);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 28px; gap: 20px;
      flex-shrink: 0;
    }
    .adm-wordmark {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--cream);
      flex: 1;
      text-decoration: none;
      transition: color 0.2s;
    }
    .adm-wordmark:hover { color: var(--gold); }
    .adm-wordmark small {
      font-family: 'Lato', sans-serif;
      font-size: 0.6rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--warm-grey);
      margin-left: 10px;
      font-style: normal;
    }
    .hdr-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--warm-grey);
      padding: 6px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .hdr-btn:hover { border-color: var(--border-hi); color: var(--gold); }
    .hdr-btn-gold {
      background: var(--gold);
      border: none;
      color: var(--brown-deep);
      padding: 7px 18px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .hdr-btn-gold:hover { background: var(--gold-light); }
    .hdr-btn-gold:disabled { opacity: 0.35; cursor: default; }
    .hdr-btn-dl {
      background: transparent;
      border: 1px solid var(--border-hi);
      color: var(--gold);
      padding: 6px 14px;
      font-family: 'Lato', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }
    .hdr-btn-dl:hover { background: rgba(201,168,76,0.1); }

    /* Body layout */
    .adm-body { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .adm-sidebar {
      width: 192px;
      background: var(--brown);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      flex-shrink: 0; overflow-y: auto;
      padding-top: 8px;
    }
    .sidebar-section-label {
      font-size: 0.58rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--warm-grey);
      padding: 16px 18px 8px;
    }
    .cat-tab {
      background: transparent;
      border: none;
      border-left: 2px solid transparent;
      color: rgba(245,240,232,0.45);
      text-align: left;
      padding: 10px 18px;
      font-family: 'Lato', sans-serif;
      font-size: 0.83rem;
      cursor: pointer;
      transition: color 0.15s, background 0.15s, border-color 0.15s;
      display: flex; align-items: center; justify-content: space-between;
      width: 100%;
    }
    .cat-tab:hover { color: var(--cream); background: rgba(255,255,255,0.03); }
    .cat-tab.active {
      color: var(--gold);
      border-left-color: var(--gold);
      background: rgba(201,168,76,0.06);
      padding-left: 16px;
    }
    .cat-badge {
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      font-size: 0.6rem;
      padding: 2px 7px;
      border-radius: 10px;
      min-width: 22px;
      text-align: center;
    }
    .sidebar-divider {
      margin: 8px 18px;
      border: none;
      border-top: 1px solid var(--border);
    }
    .sidebar-logout {
      margin-top: auto;
      border-top: 1px solid var(--border);
      padding: 12px 18px;
    }
    .btn-logout {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--warm-grey);
      padding: 7px;
      font-family: 'Lato', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-logout:hover { border-color: var(--border-hi); color: var(--cream); }

    /* Main */
    .adm-main {
      flex: 1; overflow-y: auto;
      padding: 28px 32px;
    }

    /* Category header */
    .cat-header {
      display: flex; align-items: baseline; gap: 14px;
      margin-bottom: 24px; padding-bottom: 18px;
      border-bottom: 1px solid var(--border);
    }
    .cat-heading {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem; color: var(--cream);
    }
    .cat-count-label {
      font-size: 0.72rem;
      color: var(--warm-grey);
      letter-spacing: 0.08em;
    }

    /* Add-product form */
    .add-panel {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      padding: 20px 22px;
      margin-bottom: 28px;
    }
    .add-panel-label {
      font-size: 0.6rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }
    .add-row-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }
    .add-row-img {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .f-input {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: var(--cream);
      padding: 9px 13px;
      font-family: 'Lato', sans-serif;
      font-size: 0.83rem;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
      width: 100%;
    }
    .f-input:focus { border-color: var(--border-hi); background: rgba(255,255,255,0.06); }
    .f-input::placeholder { color: rgba(245,240,232,0.2); }
    .f-input:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-upload {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.08);
      border: 1px dashed var(--border-hi);
      color: var(--gold);
      padding: 9px 16px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .btn-upload:hover { background: rgba(201,168,76,0.16); border-color: var(--gold-light); }
    .btn-upload.has-file { border-style: solid; }
    .add-or {
      font-size: 0.65rem;
      color: var(--warm-grey);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      flex-shrink: 0;
    }
    .add-actions {
      display: flex; align-items: center; gap: 12px;
    }
    .upload-filename {
      font-size: 0.72rem;
      color: var(--warm-grey);
      max-width: 150px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .upload-clear {
      background: transparent; border: none;
      color: var(--warm-grey);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
    }
    .upload-clear:hover { color: var(--red-light); }
    .btn-add {
      background: var(--gold);
      border: none;
      color: var(--brown-deep);
      padding: 10px 22px;
      font-family: 'Lato', sans-serif;
      font-weight: 700;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--gold-light); }
    .add-err { color: #e07070; font-size: 0.75rem; }

    /* Product grid */
    .prod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(185px, 1fr));
      gap: 10px;
    }
    .prod-card {
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }
    .prod-card:hover { border-color: var(--border-hi); transform: translateY(-1px); }
    .prod-img {
      height: 130px;
      background-size: cover; background-position: center;
      background-color: rgba(255,255,255,0.03);
      display: flex; align-items: center; justify-content: center;
    }
    .prod-img-missing {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--warm-grey);
    }
    .prod-info { padding: 11px 12px; }
    .prod-name {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem; color: var(--cream);
      margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .prod-desc {
      font-size: 0.72rem; color: var(--warm-grey);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .del-btn {
      position: absolute; top: 7px; right: 7px;
      width: 26px; height: 26px;
      background: rgba(107,14,18,0.88);
      border: 1px solid rgba(255,100,100,0.28);
      color: var(--red-light);
      cursor: pointer; font-size: 13px; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      opacity: 0;
      transition: opacity 0.15s, background 0.15s;
    }
    .prod-card:hover .del-btn { opacity: 1; }
    .del-btn:hover { background: var(--red-dark); border-color: #ff5555; color: #fff; }

    .empty-state {
      border: 1px dashed var(--border);
      padding: 56px 24px;
      text-align: center;
      color: var(--warm-grey);
      font-size: 0.85rem;
      line-height: 1.8;
    }

    /* Status bar */
    .adm-statusbar {
      height: 34px;
      background: var(--brown-panel);
      border-top: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 28px; gap: 18px;
      flex-shrink: 0;
    }
    .status-indicator {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4a7;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-indicator.warn { background: #ca8; }
    .status-indicator.error { background: #c55; }
    .status-msg { font-size: 0.7rem; color: var(--warm-grey); flex: 1; }
    .status-unsaved {
      font-size: 0.7rem;
      color: var(--gold);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .status-unsaved.visible { opacity: 1; }

    /* Modal */
    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(26,15,8,0.85);
      z-index: 800;
      display: flex; align-items: center; justify-content: center;
    }
    .modal {
      background: var(--brown-panel);
      border: 1px solid var(--border);
      padding: 36px 40px;
      max-width: 500px; width: 90%;
    }
    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; margin-bottom: 10px;
    }
    .modal-body {
      font-size: 0.82rem; color: var(--warm-grey);
      line-height: 1.8; margin-bottom: 20px;
    }
    .modal-body code {
      font-family: monospace;
      background: rgba(255,255,255,0.06);
      padding: 2px 6px;
      color: var(--gold);
      font-size: 0.85em;
    }
    .modal-body a { color: var(--gold); }
    .modal-row { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* Toast */
    .toast {
      position: fixed; bottom: 44px; right: 28px;
      background: var(--brown-mid);
      border: 1px solid var(--border);
      padding: 12px 18px;
      font-size: 0.8rem; color: var(--cream);
      opacity: 0; transform: translateY(6px);
      transition: opacity 0.25s, transform 0.25s;
      z-index: 2000; max-width: 300px;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { border-left: 3px solid #4a7; }
    .toast.err { border-left: 3px solid #c55; }

    /* ─── Touch-Geräte: Löschen-Button ohne Hover erreichbar ───────────── */
    @media (hover: none) {
      .del-btn { opacity: 1; width: 30px; height: 30px; font-size: 15px; }
    }

    /* ─── Mobile: App-Shell umbauen ─────────────────────────────────────── */
    @media (max-width: 780px) {
      #app { height: 100vh; height: 100dvh; }

      .adm-header {
        height: auto;
        flex-wrap: wrap;
        row-gap: 8px;
        padding: 10px 14px;
      }
      .adm-wordmark { flex: 1 1 100%; font-size: 0.92rem; }
      .adm-wordmark small { display: block; margin-left: 0; margin-top: 2px; }
      .hdr-btn, .hdr-btn-gold, .hdr-btn-dl {
        flex: 1;
        text-align: center;
        padding: 9px 8px;
        font-size: 0.62rem;
      }

      .adm-body { flex-direction: column; }
      .adm-sidebar {
        width: 100%;
        height: auto;
        flex-direction: row;
        align-items: center;
        overflow-x: auto;
        overflow-y: hidden;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding-top: 0;
        -webkit-overflow-scrolling: touch;
      }
      .sidebar-section-label { display: none; }
      .cat-tab {
        flex-shrink: 0;
        border-left: none;
        border-bottom: 2px solid transparent;
        padding: 13px 16px;
        white-space: nowrap;
      }
      .cat-tab.active { border-left-color: transparent; border-bottom-color: var(--gold); padding-left: 16px; }
      .sidebar-divider { display: none; }
      .sidebar-logout {
        margin-top: 0; border-top: none; border-left: 1px solid var(--border);
        flex-shrink: 0; padding: 0 14px;
      }
      .btn-logout { width: auto; white-space: nowrap; }

      .adm-main { padding: 16px; }
      .cat-heading { font-size: 1.25rem; }
      .add-row-top { grid-template-columns: 1fr; }
      .add-row-img { gap: 8px; }
      .add-row-img .f-input { max-width: none !important; width: 100%; }
      .btn-upload { flex: 1 1 100%; justify-content: center; }
      .add-or { flex: 1 1 100%; text-align: center; }
      .prod-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }

      .gate-card { width: min(360px, 88vw); padding: 44px 28px 36px; }
    }
  </style>
</head>
<body>

<!-- ═══ PASSWORD GATE ══════════════════════════════════════════════════ -->
<div id="gate">
  <div class="gate-card">
    <div class="gate-wordmark">Steinmetz Antiquitäten</div>
    <div class="gate-sub">Verwaltungsbereich</div>
    <div class="gate-rule"><span class="gate-rule-lozenge"></span></div>
    <form id="loginForm">
      <input type="password" id="pwInput" class="gate-input"
             placeholder="Passwort" autocomplete="current-password">
      <button type="submit" class="gate-btn">Einloggen</button>
      <div class="gate-error" id="loginErr"></div>
    </form>
  </div>
</div>

<!-- ═══ ADMIN APP ═══════════════════════════════════════════════════════ -->
<div id="app" style="display:none;">

  <!-- Header -->
  <header class="adm-header">
    <a class="adm-wordmark" href="index.html" title="Zur Startseite">
      Steinmetz Antiquitäten
      <small>Produktverwaltung</small>
    </a>
    <button class="hdr-btn-dl" id="btnDownload" title="Aktualisierte products.json herunterladen">
      ↓ Herunterladen
    </button>
    <button class="hdr-btn-gold" id="btnPublish" disabled>Veröffentlichen</button>
  </header>

  <!-- Body -->
  <div class="adm-body">

    <!-- Sidebar -->
    <nav class="adm-sidebar">
      <div class="sidebar-section-label">Kategorien</div>
      <button class="cat-tab active" data-cat="kommoden">Kommoden <span class="cat-badge" id="cnt-kommoden">0</span></button>
      <button class="cat-tab" data-cat="lampen">Lampen <span class="cat-badge" id="cnt-lampen">0</span></button>
      <button class="cat-tab" data-cat="dekoration">Dekoration <span class="cat-badge" id="cnt-dekoration">0</span></button>
      <button class="cat-tab" data-cat="tische">Tische <span class="cat-badge" id="cnt-tische">0</span></button>
      <button class="cat-tab" data-cat="sitzmoebel">Sitzmöbel <span class="cat-badge" id="cnt-sitzmoebel">0</span></button>
      <button class="cat-tab" data-cat="sekretaere">Sekretäre <span class="cat-badge" id="cnt-sekretaere">0</span></button>
      <button class="cat-tab" data-cat="schraenke">Schränke <span class="cat-badge" id="cnt-schraenke">0</span></button>
      <hr class="sidebar-divider">
      <button class="cat-tab" data-cat="angebote">Angebote <span class="cat-badge" id="cnt-angebote">0</span></button>
      <div class="sidebar-logout">
        <button class="btn-logout" id="btnLogout">Abmelden</button>
      </div>
    </nav>

    <!-- Main -->
    <main class="adm-main">
      <div class="cat-header">
        <h2 class="cat-heading" id="catHeading">Kommoden</h2>
        <span class="cat-count-label" id="catCountLabel">0 Objekte</span>
      </div>

      <!-- Add form -->
      <div class="add-panel">
        <div class="add-panel-label">Neues Produkt hinzufügen</div>
        <div class="add-row-top">
          <input class="f-input" id="newName" placeholder="Bezeichnung">
          <input class="f-input" id="newDesc" placeholder="Beschreibung (optional)">
        </div>
        <div class="add-row-img">
          <label class="btn-upload" id="uploadLabel" for="newImgFile">📷 Foto aus Mediathek wählen</label>
          <input type="file" id="newImgFile" accept="image/*" hidden>
          <span class="upload-filename" id="uploadFilename"></span>
          <button type="button" class="upload-clear" id="btnClearFile" style="display:none;" title="Foto entfernen">✕</button>
          <span class="add-or">oder URL</span>
          <input class="f-input" id="newImg" placeholder="Bild-URL (https://…)" style="max-width:220px;">
        </div>
        <div class="add-actions">
          <button class="btn-add" id="btnAdd">+ Hinzufügen</button>
          <span class="add-err" id="addErr"></span>
        </div>
      </div>

      <!-- Product grid -->
      <div class="prod-grid" id="prodGrid"></div>
    </main>
  </div>

  <!-- Status bar -->
  <footer class="adm-statusbar">
    <span class="status-indicator" id="statusDot"></span>
    <span class="status-msg" id="statusMsg">Bereit</span>
    <span class="status-unsaved" id="unsavedBadge">● Ungespeicherte Änderungen</span>
  </footer>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ─── CONFIG ────────────────────────────────────────────────────────── */
const API_BASE = ''; // leer = relativer Pfad zur selben Domain, auf der admin.html liegt (www.steinmetz-antiquitaeten.de)

const CAT_LABELS = {
  kommoden:'Kommoden', lampen:'Lampen', dekoration:'Dekoration',
  tische:'Tische', sitzmoebel:'Sitzmöbel', sekretaere:'Sekretäre',
  schraenke:'Schränke', angebote:'Angebote'
};

/* ─── STATE ─────────────────────────────────────────────────────────── */
let products    = {};
let currentCat  = 'kommoden';
let isDirty     = false;
let pendingFileData  = null; // { path, base64 } für das aktuell im Formular gewählte Foto
let pendingUploads   = JSON.parse(localStorage.getItem('sa_pending_uploads') || '{}'); // { path: base64 } noch nicht veröffentlichte Fotos
let pendingDeletions = JSON.parse(localStorage.getItem('sa_pending_deletions') || '[]'); // [{cat, id}] noch nicht veröffentlichte Löschungen

function savePendingDeletions() {
  try { localStorage.setItem('sa_pending_deletions', JSON.stringify(pendingDeletions)); }
  catch (e) {}
}

async function fetchServerProducts() {
  try {
    const r = await fetch('products.json?' + Date.now());
    if (r.ok) return await r.json();
  } catch (_) {}
  return null;
}

function savePendingUploads() {
  try {
    localStorage.setItem('sa_pending_uploads', JSON.stringify(pendingUploads));
  } catch (e) {
    toast('Warnung: Zwischenspeicher voll — Foto bleibt bis zur Veröffentlichung nur im Formular.', 'err');
  }
}

/* ─── PASSWORD ──────────────────────────────────────────────────────── */
async function sha256(str) {
  const buf  = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* Default-Passwort: Steinmetz
   Ändern: Neues Passwort eingeben, Hash via Browser-Console berechnen:
     sha256('NeuesPasswort').then(console.log)
   Dann localStorage.setItem('sa_pw_hash', '<hash>') ausführen. */
async function getStoredHash() {
  return localStorage.getItem('sa_pw_hash') || await sha256('Steinmetz');
}

/* ─── BOOT ──────────────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('sa_auth') === '1') boot();

  /* Login */
  document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const entered = await sha256(document.getElementById('pwInput').value);
    if (entered === await getStoredHash()) {
      sessionStorage.setItem('sa_auth', '1');
      sessionStorage.setItem('sa_session_hash', entered);
      boot();
    } else {
      document.getElementById('loginErr').textContent = 'Falsches Passwort.';
      document.getElementById('pwInput').value = '';
    }
  });

  /* Category tabs */
  document.querySelectorAll('.cat-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.dataset.cat;
      renderCat();
    });
  });

  /* Foto aus Mediathek wählen */
  document.getElementById('newImgFile').addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const errEl = document.getElementById('addErr');
    errEl.textContent = '';

    if (!file.type.startsWith('image/')) {
      errEl.textContent = 'Bitte eine Bilddatei auswählen.';
      return;
    }

    setStatus('Foto wird komprimiert …', 'warn');
    try {
      const { base64 } = await compressImage(file);
      const path = `images/products/${currentCat}-${Date.now().toString(36)}-${uid()}.jpg`;
      pendingFileData = { path, base64 };

      document.getElementById('uploadFilename').textContent = file.name;
      document.getElementById('btnClearFile').style.display = 'inline';
      document.getElementById('uploadLabel').classList.add('has-file');

      const urlInput = document.getElementById('newImg');
      urlInput.value = '';
      urlInput.disabled = true;

      setStatus('Foto bereit — jetzt Produkt hinzufügen.', 'ok');
    } catch (err) {
      errEl.textContent = 'Foto konnte nicht verarbeitet werden.';
      setStatus('Fehler bei der Bildverarbeitung.', 'error');
    }
  });

  document.getElementById('btnClearFile').addEventListener('click', () => clearStagedFile());

  document.getElementById('btnAdd').addEventListener('click', addProduct);
  document.getElementById('btnPublish').addEventListener('click', publish);
  document.getElementById('btnDownload').addEventListener('click', downloadJSON);
  document.getElementById('btnLogout').addEventListener('click', () => {
    sessionStorage.removeItem('sa_auth');
    sessionStorage.removeItem('sa_session_hash');
    location.reload();
  });
});

/* ─── BOOT SEQUENCE ─────────────────────────────────────────────────── */
async function boot() {
  document.getElementById('gate').style.display = 'none';
  document.getElementById('app').style.display  = 'flex';
  await loadProducts();
}

/* ─── LOAD ──────────────────────────────────────────────────────────── */
async function loadProducts() {
  setStatus('Lade Produktdaten …', 'warn');

  /* Server ist immer die Wahrheit — ein alter lokaler Entwurf darf sie nie
     einfach ersetzen (das hat schon einmal frisch hinzugefügte Produkte
     anderer Geräte überschrieben). Ein Entwurf wird nur noch verwendet, um
     wirklich unveröffentlichte Einträge (per id) zu den Serverdaten zu
     ergänzen. */
  let serverProducts = null;
  try {
    const r = await fetch('products.json?' + Date.now());
    if (r.ok) serverProducts = await r.json();
  } catch (_) {}

  if (!serverProducts) {
    serverProducts = Object.fromEntries(Object.keys(CAT_LABELS).map(k=>[k,[]]));
  }

  const draft = localStorage.getItem('sa_draft');
  let mergedInSomething = false;

  if (draft) {
    const draftProducts = JSON.parse(draft);
    for (const cat of Object.keys(draftProducts)) {
      if (!serverProducts[cat]) serverProducts[cat] = [];
      const knownIds = new Set(serverProducts[cat].map(p => p.id));
      for (const p of draftProducts[cat] || []) {
        if (!knownIds.has(p.id)) {
          serverProducts[cat].unshift(p);
          mergedInSomething = true;
        }
      }
    }
  }

  products = serverProducts;
  finishLoad(mergedInSomething);
  setStatus(
    mergedInSomething
      ? 'Serverdaten geladen, unveröffentlichter lokaler Entwurf ergänzt.'
      : 'Produktdaten erfolgreich geladen.',
    'ok'
  );
  if (draft && !mergedInSomething) {
    // Entwurf war bereits vollständig auf dem Server — aufräumen
    localStorage.removeItem('sa_draft');
  }
}

function finishLoad(dirty) {
  isDirty = dirty;
  Object.keys(CAT_LABELS).forEach(updateBadge);
  renderCat();
  updatePublishBtn();
}

/* ─── RENDER ────────────────────────────────────────────────────────── */
function renderCat() {
  const label = CAT_LABELS[currentCat] || currentCat;
  const items = products[currentCat] || [];
  document.getElementById('catHeading').textContent    = label;
  document.getElementById('catCountLabel').textContent = `${items.length} Objekte`;

  const grid = document.getElementById('prodGrid');
  if (!items.length) {
    grid.innerHTML = '<div class="empty-state">Keine Produkte in dieser Kategorie.<br>Fügen Sie oben ein neues Produkt hinzu.</div>';
    return;
  }
  grid.innerHTML = items.map((p, i) => `
    <div class="prod-card">
      <div class="prod-img" style="background-image:url('${esc(resolveImgSrc(p.img))}')">${p.img ? '' : '<span class=\"prod-img-missing\">Kein Foto</span>'}</div>
      <div class="prod-info">
        <div class="prod-name" title="${esc(p.name)}">${esc(p.name)}</div>
        <div class="prod-desc" title="${esc(p.desc)}">${esc(p.desc)}</div>
      </div>
      <button class="del-btn" onclick="delProduct(${i})" title="Löschen">×</button>
    </div>`).join('');
}

/* Noch nicht veröffentlichte Fotos liegen nur als Base64 in pendingUploads vor —
   der spätere GitHub-Pfad existiert erst nach dem Veröffentlichen. Für die
   Vorschau greifen wir daher so lange auf die Base64-Daten zurück. */
function resolveImgSrc(img) {
  if (img && pendingUploads[img]) return 'data:image/jpeg;base64,' + pendingUploads[img];
  return img || '';
}

function updateBadge(cat) {
  const el = document.getElementById(`cnt-${cat}`);
  if (el) el.textContent = (products[cat]||[]).length;
}

/* ─── ADD / DELETE ──────────────────────────────────────────────────── */
async function addProduct() {
  const name   = document.getElementById('newName').value.trim();
  const desc   = document.getElementById('newDesc').value.trim();
  const urlVal = document.getElementById('newImg').value.trim();
  const errEl  = document.getElementById('addErr');
  errEl.textContent = '';

  if (!name) { errEl.textContent = 'Bezeichnung erforderlich.'; return; }

  let img = null;
  if (pendingFileData) {
    img = pendingFileData.path;
    pendingUploads[pendingFileData.path] = pendingFileData.base64;
    savePendingUploads();
  } else if (urlVal) {
    img = urlVal;
  }
  if (!img) { errEl.textContent = 'Bitte ein Foto hochladen oder eine Bild-URL angeben.'; return; }

  if (!products[currentCat]) products[currentCat] = [];
  products[currentCat].unshift({ id: uid(), img, name, desc });

  resetAddForm();
  updateBadge(currentCat);
  renderCat();
  markDirty();

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.textContent = 'Wird veröffentlicht …';
  try {
    await publish();
  } finally {
    btn.disabled = false;
    btn.textContent = '+ Hinzufügen';
  }
}

function resetAddForm() {
  ['newName','newDesc','newImg'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('newImg').disabled = false;
  document.getElementById('newImgFile').value = '';
  clearStagedFile();
}

function clearStagedFile() {
  pendingFileData = null;
  document.getElementById('newImgFile').value = '';
  document.getElementById('newImg').disabled = false;
  document.getElementById('uploadFilename').textContent = '';
  document.getElementById('btnClearFile').style.display = 'none';
  document.getElementById('uploadLabel').classList.remove('has-file');
}

async function delProduct(i) {
  const p = (products[currentCat]||[])[i];
  if (!p) return;
  if (!confirm(`„${p.name}" wirklich löschen?`)) return;
  if (p.img && pendingUploads[p.img]) {
    delete pendingUploads[p.img];
    savePendingUploads();
  }
  pendingDeletions.push({ cat: currentCat, id: p.id });
  savePendingDeletions();
  products[currentCat].splice(i, 1);
  updateBadge(currentCat);
  renderCat();
  markDirty();
  toast(`„${p.name}" gelöscht.`, 'ok');
  await publish();
}

/* ─── DIRTY STATE ───────────────────────────────────────────────────── */
function markDirty() {
  isDirty = true;
  localStorage.setItem('sa_draft', JSON.stringify(products));
  document.getElementById('unsavedBadge').classList.add('visible');
  updatePublishBtn();
}

function clearDirty() {
  isDirty = false;
  localStorage.removeItem('sa_draft');
  document.getElementById('unsavedBadge').classList.remove('visible');
  updatePublishBtn();
}

function updatePublishBtn() {
  const btn = document.getElementById('btnPublish');
  btn.disabled = !isDirty;
}

/* ─── DOWNLOAD ──────────────────────────────────────────────────────── */
function downloadJSON() {
  const blob = new Blob([JSON.stringify(products, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'products.json';
  a.click();
  toast('products.json heruntergeladen. Datei ersetzen und git push ausführen.', 'ok');
}

/* ─── PUBLISH ÜBER SERVERSEITIGE FUNKTION (Vercel) ───────────────────── */
/* Der GitHub-Token liegt ausschließlich server-side als Env-Var. Das
   Admin-Panel schickt nur Produktdaten + Passwort-Hash an eine zentrale
   API-Route, die dann mit dem Token bei GitHub schreibt. So muss der
   Token nirgends im Browser/Gerät gespeichert werden. */
async function publish() {
  const btn = document.getElementById('btnPublish');
  btn.disabled = true;
  btn.textContent = 'Wird veröffentlicht …';
  setStatus('Veröffentliche …', 'warn');

  try {
    const passwordHash = sessionStorage.getItem('sa_session_hash');
    if (!passwordHash) throw new Error('Sitzung abgelaufen — bitte neu einloggen.');

    /* Nie den möglicherweise veralteten lokalen Stand blind überschreiben:
       frische Serverdaten holen, eigene Löschungen abziehen, eigene noch
       nicht veröffentlichte Hinzufügungen ergänzen. So überschreibt ein
       Gerät nie, was ein anderes Gerät in der Zwischenzeit hinzugefügt hat. */
    const serverProducts = (await fetchServerProducts()) || {};
    const merged = {};
    for (const cat of Object.keys(CAT_LABELS)) {
      let items = (serverProducts[cat] || []).filter(
        p => !pendingDeletions.some(d => d.cat === cat && d.id === p.id)
      );
      const knownIds = new Set(items.map(p => p.id));
      const localOnly = (products[cat] || []).filter(p => !knownIds.has(p.id));
      merged[cat] = [...localOnly, ...items];
    }

    // Bildpfade sind relativ zur ausgelieferten Seite (images/products/...);
    // im Repository liegen sie aber unter public/, das hängen wir hier an.
    const images = Object.entries(pendingUploads).map(([path, content]) => ({ path: `public/${path}`, content }));

    const r = await fetch(`${API_BASE}/api/admin/publish`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passwordHash, products: merged, images }),
    });
    const result = await r.json();

    if (r.ok && result.success) {
      products = merged;
      pendingUploads = {};
      pendingDeletions = [];
      savePendingUploads();
      savePendingDeletions();
      clearDirty();
      renderCat();
      Object.keys(CAT_LABELS).forEach(updateBadge);
      setStatus('Erfolgreich veröffentlicht! GitHub Pages aktualisiert sich in ~1 Minute.', 'ok');
      toast('Erfolgreich veröffentlicht!', 'ok');
    } else {
      throw new Error(result.error || `HTTP ${r.status}`);
    }
  } catch (e) {
    setStatus(`Fehler: ${e.message}`, 'error');
    toast(`Fehler: ${e.message}`, 'err');
  } finally {
    btn.textContent = 'Veröffentlichen';
    updatePublishBtn();
  }
}

/* ─── BILDKOMPRIMIERUNG (clientseitig, vor dem Upload) ───────────────── */
function compressImage(file, maxDim = 1400, quality = 0.78) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (Math.max(width, height) > maxDim) {
          const ratio = maxDim / Math.max(width, height);
          width  = Math.round(width * ratio);
          height = Math.round(height * ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        const dataUrl = canvas.toDataURL('image/jpeg', quality);
        resolve({ dataUrl, base64: dataUrl.split(',')[1] });
      };
      img.onerror = () => reject(new Error('Bild konnte nicht geladen werden.'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('Datei konnte nicht gelesen werden.'));
    reader.readAsDataURL(file);
  });
}

/* ─── UTILS ─────────────────────────────────────────────────────────── */
function uid() { return Math.random().toString(36).slice(2, 10); }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')
                      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setStatus(msg, type) {
  document.getElementById('statusMsg').textContent = msg;
  const dot = document.getElementById('statusDot');
  dot.className = 'status-indicator' + (type==='warn'?' warn':type==='error'?' error':'');
}

let _toastTimer;
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = `toast ${type} show`;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 3800);
}
</script>
</body>
</html>
